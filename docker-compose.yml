version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: achave-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: achave_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - achave_pg_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: achave-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://postgres@db:5432/achave_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-cambia_esta_clave_en_produccion}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-60}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: achave-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      # La URL que el NAVEGADOR usa para llamar al backend.
      # Si accedes desde otra máquina, cambia esto a la IP/dominio del servidor.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: always

  adminer:
    image: adminer
    container_name: achave-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  achave_pg_data:
